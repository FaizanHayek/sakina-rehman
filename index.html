<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakina Rahman - Noble Matrimony</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Noto+Naskh+Arabic:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ivory: #fdfbf7;
            --olive: #3d5a45;
            --emerald: #064e3b;
            --gold: #c5a059;
            --sand: #e8e2d6;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--ivory);
            color: var(--olive);
            margin: 0;
            overflow-x: hidden;
        }

        .serif-heading {
            font-family: 'Playfair Display', serif;
        }

        .amiri-font {
            font-family: 'Amiri', serif;
        }

        .cinzel-font {
            font-family: 'Cinzel', serif;
        }

        .cinzel-decorative {
            font-family: 'Cinzel Decorative', cursive;
        }

        .basmala-font {
            font-family: 'Noto Naskh Arabic', serif;
        }

        /* Islamic Geometric Pattern */
        .geometric-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0l12.5 37.5 37.5 12.5-37.5 12.5L50 100 37.5 62.5 0 50l37.5-12.5z' fill='%233d5a45' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes softPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(197, 160, 89, 0); }
            50% { transform: scale(1.03); box-shadow: 0 0 30px 0 rgba(197, 160, 89, 0.2); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes drawLine {
            from { width: 0; opacity: 0; }
            to { width: 100%; opacity: 1; }
        }

        @keyframes borderGlow {
            0%, 100% { border-color: rgba(197, 160, 89, 0.2); box-shadow: 0 0 15px rgba(197, 160, 89, 0.1); }
            50% { border-color: rgba(197, 160, 89, 0.6); box-shadow: 0 0 30px rgba(197, 160, 89, 0.3); }
        }

        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes shimmerText {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes sacredGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(197, 160, 89, 0.2); }
            50% { text-shadow: 0 0 15px rgba(197, 160, 89, 0.8), 0 0 30px rgba(197, 160, 89, 0.4); }
        }

        .animate-fade-in { animation: fadeIn 2.5s ease-out forwards; }
        .animate-fade-up { opacity: 0; animation: fadeUp 1.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-pulse-soft { animation: softPulse 5s ease-in-out infinite; }
        .animate-draw-line { animation: drawLine 2.5s ease-in-out forwards; }
        .animate-border-glow { animation: borderGlow 4s ease-in-out infinite; }
        .animate-spin-slow { animation: spinSlow 15s linear infinite; }
        .animate-sacred-glow { animation: sacredGlow 3s ease-in-out infinite; }
        
        .shimmer-gold {
            background: linear-gradient(90deg, var(--gold) 0%, #fff 50%, var(--gold) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmerText 5s linear infinite;
        }

        .sacred-text-hover:hover {
            letter-spacing: 0.3em;
            color: var(--gold);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .delay-300 { animation-delay: 0.3s; }
        .delay-700 { animation-delay: 0.7s; }
        .delay-1200 { animation-delay: 1.2s; }
        .delay-1800 { animation-delay: 1.8s; }

        .basmala-glow {
            text-shadow: 0 0 30px rgba(197, 160, 89, 0.4);
        }

        .gold-glow-text {
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.35);
        }

        .divider-dot::after {
            content: "•";
            margin: 0 1.5rem;
            color: var(--gold);
            opacity: 0.3;
        }
        .divider-dot:last-child::after {
            content: "";
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--ivory);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--sand);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold);
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="geometric-bg">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
